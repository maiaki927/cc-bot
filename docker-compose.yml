services:
  cc-bot-1:
    build: .
    image: ${CC_BOT_IMAGE:-cc-bot:latest}
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_1}
      MCP_TRANSPORT: http
      PORT: "8080"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      BOT_NAME: ${BOT_NAME_1:-一號}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
    ports:
      - "8081:8080"

  cc-bot-2:
    build: .
    image: ${CC_BOT_IMAGE:-cc-bot:latest}
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_2}
      MCP_TRANSPORT: http
      PORT: "8080"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      BOT_NAME: ${BOT_NAME_2:-二號}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
    ports:
      - "8082:8080"

  cc-bot-3:
    build: .
    image: ${CC_BOT_IMAGE:-cc-bot:latest}
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_3}
      MCP_TRANSPORT: http
      PORT: "8080"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      BOT_NAME: ${BOT_NAME_3:-三號}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:-}
    ports:
      - "8083:8080"
